<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <div class="BoxAccept">
        <h3 class="TextInfoForBoxAccept">هل تريد الخروج؟</h3>
        
        <div class="AcceptButton">
            <h3 class="AcceptText">قبول</h3>
        </div>

        <div class="CancelButton">
            <h3 class="CancelText">رفض</h3>
        </div>
    </div>
    <div class="ExitCube"></div>

    <div class="Circle"></div>
    <div class="CircleDown"></div>
    <h3 class="Score">0</h3>
    <h3 class="TypeText">النص</h3>

    <div class="BoxSelecting">
        <div class="Box" NumberFrameID="تسبيح">
            <h3 class="TextBox" style="font-size: 9.5cqi;">سبحان الله</h3>
        </div>

        <div class="Box" NumberFrameID="تحميد">
            <h3 class="TextBox" style="font-size: 9.5cqi;">الحمدلله</h3>
        </div>

        <div class="Box" NumberFrameID="تهليل">
            <h3 class="TextBox" style="font-size: 9.5cqi;">لا إله إلا الله</h3>
        </div>

         <div class="Box" NumberFrameID="حوقله">
            <h3 class="TextBox" style="font-size: 8.5cqi;">لا حول ولا <br>قوة إلا بالله</h3>
        </div>
        
        <div class="Box" NumberFrameID="تكبير">
            <h3 class="TextBox" style="font-size: 9.5cqi;">الله أكبر</h3>
        </div>

        <div class="Box" NumberFrameID="الصلاة">
            <h3 class="TextBox" style="font-size: 6cqi;">اللهم صل وسلم على محمد</h3>
        </div>

        <div class="Box" NumberFrameID="رب اغفرلي">
            <h3 class="TextBox" style="font-size: 9.5cqi;">رب اغفرلي</h3>
        </div>

        <div class="Box" NumberFrameID="حسبله">
            <h3 class="TextBox" style="font-size: 8.5cqi;">حسبنا الله<br> ونعم الوكيل</h3>
        </div>

        <div class="Box" NumberFrameID="استغفار">
            <h3 class="TextBox" style="font-size: 9.5cqi;">استغفر الله</h3>
        </div>

        <div class="Box" NumberFrameID="بسمله">
            <h3 class="TextBox" style="font-size: 7.5cqi;">بسم الله <br>الرحمن الرحيم</h3>
        </div>
    </div>
    
    <div class="Add">
        <h3 class="TextAdd">إضافة</h3>
    </div>
